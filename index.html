<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Moritz Frowerk — Portfolio</title>
<style>
  @font-face{font-family:"Alte Haas Grotesk";src:url("AlteHaasGroteskRegular.ttf") format("truetype");font-weight:400;font-style:normal;font-display:swap}
  @font-face{font-family:"Alte Haas Grotesk";src:url("AlteHaasGroteskBold.ttf") format("truetype");font-weight:700;font-style:normal;font-display:swap}
  :root{--ink:#141414;--muted:#8a857b;--accent:#ff3b2f;--line:#e7e5e0;--font:"Alte Haas Grotesk",Helvetica,Arial,sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{background:#fff;color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .wrap{max-width:1080px;margin:0 auto;container-type:inline-size}
  nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:12px 20px;font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
  nav .brand{color:var(--accent)}
  nav .idx{display:flex;gap:16px}
  nav a{color:var(--ink);opacity:.66;text-decoration:none}
  nav a:hover{opacity:1;color:var(--accent)}
  .cover{display:flex;align-items:stretch;gap:2.6cqw;padding:9cqw 6cqw 4cqw 0}
  .cover .photo{flex:0 0 53.5cqw;aspect-ratio:578 / 612;background:#eceae6;overflow:hidden}
  .cover .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .cover .info{flex:1 1 auto;min-width:0;display:flex;flex-direction:column}
  .name{font-weight:700;font-size:9.3cqw;line-height:.9;letter-spacing:-.015em}
  .more{align-self:flex-start;margin-top:1.8cqw;font-size:3.2cqw;color:var(--accent);text-decoration:underline;text-underline-offset:.12em;text-decoration-thickness:.055em}
  .contact{margin-top:auto;display:flex;flex-direction:column;font-size:2.78cqw;line-height:1.12}
  .contact a{color:inherit;text-decoration:none}
  .contact a:hover{color:var(--accent)}
  .tl-sec{padding:5cqw 6cqw 5cqw 0}
  .tl-lbl{font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;color:var(--muted);padding:0 0 16px}
  .tl{position:relative;overflow-x:auto;overflow-y:hidden;cursor:grab;scrollbar-width:none;-webkit-mask-image:linear-gradient(90deg,transparent,#000 3%,#000 97%,transparent);mask-image:linear-gradient(90deg,transparent,#000 3%,#000 97%,transparent)}
  .tl::-webkit-scrollbar{display:none}
  .tl.grabbing{cursor:grabbing}
  .track{position:relative;display:flex;align-items:flex-start;width:max-content}
  .track::before{content:"";position:absolute;left:0;right:0;top:9px;height:3px;background-image:radial-gradient(circle,#d3d1cb 1.1px,transparent 1.5px);background-size:9px 3px;background-repeat:repeat-x;background-position:left center}
  .node{flex:0 0 auto;width:236px;padding:0 26px 0 0;user-select:none}
  .dot{width:13px;height:13px;border-radius:50%;background:var(--ink);margin:3px 0 22px;position:relative;z-index:2}
  .node.hi .dot{background:var(--accent);box-shadow:0 0 0 5px rgba(255,59,47,.14)}
  .date{font-weight:700;font-size:19px}
  .node.hi .date{color:var(--accent)}
  .title{font-weight:700;font-size:14px;margin-top:6px}
  .sub{font-weight:400;font-size:12px;color:#6b675f;margin-top:3px;line-height:1.4}
  .logo{margin-top:13px;height:26px;display:inline-flex;align-items:center;font-size:11px;letter-spacing:.1em;color:#b6b1a8;border:1px dashed #dcdcdc;border-radius:6px;padding:0 9px;text-transform:uppercase}
  .blocks{margin-top:20px}
  .block{position:relative;width:100%;display:block;background:#f4f2ee center/cover no-repeat;opacity:0;transform:translateY(48px);transition:opacity .9s cubic-bezier(.16,.7,.2,1),transform .9s cubic-bezier(.16,.7,.2,1)}
  .block.in{opacity:1;transform:none}
  .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .ph .card{text-align:center;color:#a7a49c;font-size:12px;letter-spacing:.06em;border:1.5px dashed #d8d5cd;border-radius:14px;padding:22px 26px;background:#fff;max-width:82%}
  .ph .card b{display:block;font-weight:700;font-size:34px;color:#c4c1b9;letter-spacing:-.01em;margin-bottom:8px;text-transform:uppercase;line-height:1}
  .ph .card code{color:var(--accent)}
  .block.loaded .ph{display:none}
  footer{padding:9cqw 6cqw 12cqw 0;border-top:1px solid var(--line);margin-top:6px}
  footer .big{font-weight:700;font-size:5.5cqw;letter-spacing:-.02em}
  footer .c{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px 22px;font-size:14px}
  footer a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line)}
  footer a:hover{color:var(--accent);border-color:var(--accent)}
  .vid-sec{padding:5cqw 6cqw 6cqw 0}
  .vid-sec .lbl{font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;color:var(--muted);padding:0 0 16px}
  .vid-sec video{width:100%;display:block;background:#000;border-radius:2px}
</style>
</head>
<body>
<nav>
  <span class="brand">MF · Portfolio</span>
  <span class="idx"><a href="#thesis">01</a><a href="#zpc">ZPC</a><a href="#lemmo">Lemmo</a><a href="#merc">MB</a><a href="#reel">Reel</a><a href="#more">+</a></span>
</nav>
<div class="wrap">
  <header class="cover">
    <div class="photo"><img src="profile.png" alt="Moritz Frowerk"></div>
    <div class="info">
      <div class="name">Moritz<br>Frowerk</div>
      <a class="more" href="#thesis">more…</a>
      <div class="contact">
        <span>25 Jahre</span>
        <span>Frankfurt am Main</span>
        <a href="tel:+491627461323">+49 162 746 1323</a>
        <a href="mailto:frowerkmo@gmail.com">frowerkmo@gmail.com</a>
      </div>
    </div>
  </header>
  <section class="tl-sec">
    <div class="tl-lbl">Career · drag me / auto-runs</div>
    <div class="tl" id="tl"><div class="track" id="track"></div></div>
  </section>
  <div class="blocks" id="stage"></div>
  <section class="vid-sec" id="reel">
    <div class="lbl">Reel · 0717</div>
    <video controls preload="metadata" playsinline>
      <source src="0717.mp4" type="video/mp4">

  </section>
  <footer>
    <div class="big">Let’s build something.</div>
    <div class="c">
      <a href="mailto:frowerkmo@gmail.com">frowerkmo@gmail.com</a>
      <a href="https://instagram.com/cardrawing">Instagram</a>
      <a href="#">Back to top ↑</a>
    </div>
  </footer>
</div>
<script>
  var ITEMS=[["2016–18","AFK Heilbronn","Art & Design",0,"AFK"],["2018–21","AFK Heilbronn","Technical Gymnasium · Design & Media",0,"AFK"],["2021–now","Self-employed","Cardrawing · car portraits & social",0,"CARDRAWING"],["2024–25","Mercedes-Benz","Internship · Product/Industrial Design",1,"MERCEDES-BENZ"],["2024–26","request.change","Freelance · Design & AI automation",1,"REQUEST.CHANGE"],["now","Hof University","Design & Mobility (B.A.)",1,"HOF UNIVERSITY"]];
  var track=document.getElementById("track"), tl=document.getElementById("tl");
  ITEMS.concat(ITEMS).forEach(function(it){var n=document.createElement("div");n.className="node"+(it[3]?" hi":"");n.innerHTML='<div class="dot"></div><div class="date">'+it[0]+'</div><div class="title">'+it[1]+'</div><div class="sub">'+it[2]+'</div><div class="logo">'+it[4]+'</div>';track.appendChild(n);});
  var paused=false,drag=false,sx=0,sl=0;
  function tick(){ if(!paused){ tl.scrollLeft+=0.5; if(tl.scrollLeft>=track.scrollWidth/2){ tl.scrollLeft-=track.scrollWidth/2; } } requestAnimationFrame(tick); }
  requestAnimationFrame(tick);
  ["pointerenter","touchstart","wheel"].forEach(function(e){tl.addEventListener(e,function(){paused=true;},{passive:true});});
  tl.addEventListener("pointerleave",function(){if(!drag)paused=false;});
  tl.addEventListener("pointerdown",function(e){drag=true;paused=true;sx=e.clientX;sl=tl.scrollLeft;tl.classList.add("grabbing");tl.setPointerCapture(e.pointerId);});
  tl.addEventListener("pointermove",function(e){if(!drag)return;tl.scrollLeft=sl-(e.clientX-sx);});
  function endDrag(){drag=false;tl.classList.remove("grabbing");setTimeout(function(){paused=false;},900);}
  tl.addEventListener("pointerup",endDrag); tl.addEventListener("pointercancel",endDrag);
  var BLOCKS=[["bachelor_teaser_1080x1400",1080,2746,"thesis","01 · Bachelor Thesis"],["zero_parking_city_1080x4000",1080,4367,"zpc","02 · Zero-Parking City"],["lemmo_1080x3600",1080,3600,"lemmo","03 · Lemmo"],["mercedes_1080x1800",1080,1800,"merc","Mercedes"],["collection_1080x2600",1080,2600,"more","Collection"]];
  var stage=document.getElementById("stage");
  BLOCKS.forEach(function(b){var name=b[0],w=b[1],h=b[2],id=b[3],label=b[4];var s=document.createElement("section");s.className="block";if(id)s.id=id;s.style.aspectRatio=w+" / "+h;s.innerHTML='<div class="ph"><div class="card"><b>'+label+'</b>Target: <code>'+name+'.png</code></div></div>';var img=new Image();img.onload=function(){s.style.backgroundImage='url("'+name+'.png")';s.classList.add("loaded");};img.src=''+name+'.png';stage.appendChild(s);});
  var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}});},{threshold:.08});
  document.querySelectorAll(".block").forEach(function(b){io.observe(b);});
</script>
</body>
</html>
